<!DOCTYPE html>
<html lang="ru">
<body>
<!-- Fragment: event page — extra time + penalties -->
<div class="event__l">
    <div class="event__c" itemprop="homeTeam" itemscope itemtype="http://schema.org/SportsTeam">
        <span class="event__c-name" itemprop="name">Уэльс</span>
    </div>
    <div class="event__data">
        <div class="event__status">Завершено по серии пенальти</div>
        <div class="event__score">
            <div class="event__score-i" data-team="localteam">1</div>
            <div class="event__score-i" data-team="visitorteam">1</div>
        </div>
        <div class="event__text">
            <span>1-й тайм </span><b class="event__score-t1">0:0</b>
        </div>
        <div class="event__text">
            <span>2-й тайм </span><b class="event__score-t2">1:1</b>
        </div>
        <div class="event__text">
            <span>Доп. время </span><b class="event__score-et">0:0</b>
        </div>
        <div class="event__text">
            <span>Пенальти </span><b class="event__score-et">2:4</b>
        </div>
        <div class="event__text">26.03.2026 22:45</div>
    </div>
    <div class="event__c" itemprop="awayTeam" itemscope itemtype="http://schema.org/SportsTeam">
        <span class="event__c-name" itemprop="name">Босния и Герцеговина</span>
    </div>
</div>
</body>
</html>
