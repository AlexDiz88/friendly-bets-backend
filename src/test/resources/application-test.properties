# Профиль test: URI задаётся в AbstractMongoIntegrationTest (@DynamicPropertySource).
# По умолчанию: mongodb://localhost:27017/friendly_bets_integration (отдельная БД для тестов).
# Переопределение: mvn test -Dtest.mongo.uri=mongodb://localhost:27017/my_test_db
# Testcontainers (Docker): mvn test -Dtest.mongo.mode=testcontainers

spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
  org.springframework.boot.autoconfigure.mongo.embedded.EmbeddedMongoAutoConfiguration

cloud.aws.credentials.access-key=test
cloud.aws.credentials.secret-key=test
cloud.aws.region.static=us-east-1
cloud.aws.s3.bucket=test-bucket

upload.path.avatars=../frontend/public/upload/avatars
upload.path.logo=../frontend/public/upload/logo
app.root-redirect-url=swagger-ui.html

logging.level.org.springframework.data.mongodb.core=WARN
logging.level.org.springframework.security=WARN
