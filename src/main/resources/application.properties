#spring.config.import=file:./db.properties
# ----- choose DB -----
#spring.data.mongodb.uri=${mongodb.uri}/friendly-bets
spring.data.mongodb.uri=${mongodb.uri}/test
#spring.data.mongodb.uri=mongodb://localhost:27017/test
# ---------------------
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID}
cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY}
cloud.aws.region.static=${AWS_REGION}
cloud.aws.s3.bucket=${AWS_S3_BUCKET}
# ---------------------
#spring.data.mongodb.host=${railway.app.mongodb.host}
#spring.data.mongodb.port=${railway.app.mongodb.port}
#spring.data.mongodb.database=${railway.app.mongodb.database}
#spring.data.mongodb.username=${railway.app.mongodb.username}
#spring.data.mongodb.password=${railway.app.mongodb.password}
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-swallow-size=50MB
logging.level.org.springframework.security=DEBUG
# DEBUG сильно замедляет массовые операции (settle, gameweek recalc). Для локальной отладки Mongo — application-dev.properties.
logging.level.org.springframework.data.mongodb.core=WARN
logging.level.net.friendly_bets.footballdata=INFO
logging.level.net.friendly_bets.externaldata=INFO
logging.level.net.friendly_bets.oddsapi=INFO
server.port=8080
app.root-redirect-url=swagger-ui.html
# Сессия и cookie JSESSIONID (~2 года). 63072000 с = 730 дней.
server.servlet.session.timeout=730d
server.servlet.session.cookie.max-age=63072000
app.security.remember-me.key=${REMEMBER_ME_KEY:friendly-bets-remember-me-dev}
app.security.remember-me.token-validity-seconds=63072000
football-data.api-key=${FOOTBALL_DATA_API_KEY:}
football-data.base-url=https://api.football-data.org/v4
football-data.sync-enabled=true
football-data.auto-settle-enabled=true
# 15 minutes
football-data.polling-interval-ms=900000
football-data.default-season=2025
# Пусто — первый ADMIN в БД (см. AutoBetSettlementService.resolveSystemModeratorId)
football-data.system-moderator-id=
# match result sync policy (runtime override via admin panel)
match-result-sync.primary-provider=4score.ru
match-result-sync.secondary-provider=football-data
match-result-sync.dual-verification-enabled=true
match-result-sync.allow-finalize-without-secondary=false
match-result-sync.require-stable-polls=2
match-result-sync.min-minutes-after-kickoff=105
match-result-sync.min-minutes-after-kickoff-knockout=150
match-result-sync.min-minutes-since-api-last-updated=30
match-result-sync.auto-settle-only-when-matchday-completed=false
# api-football / api-sports (secondary score provider)
api-football.api-key=${API_FOOTBALL_API_KEY:}
api-football.base-url=https://v3.football.api-sports.io
api-football.sync-enabled=false
odds-api.api-key=${ODDS_API_KEY:}
odds-api.base-url=https://api.odds-api.io/v3
odds-api.sync-enabled=true
odds-api.sync-interval-ms=43200000
odds-api.bookmakers=Bet365,1xbet
odds-api.event-window-hours=6
# odds-api.league-slugs.EPL=england-premier-league
# odds-api.league-slugs.WC=international-world-cup
odds-api.fallback-only-for-wc=true
marathonbet.sync-enabled=true
marathonbet.slot-sync-interval-ms=21600000
marathonbet.slot-sync-stagger-ms=10800000
marathonbet.sync-interval-ms=43200000
marathonbet.tournament-tree-ids.WC=2253726
marathonbet.event-window-hours=6
marathonbet.primary-for-leagues=WC
marathonbet.fallback-to-odds-api=true
fourscore.enabled=true
fourscore.base-url=https://4score.ru
fourscore.request-delay-ms=1500
fourscore.preview-request-delay-ms=300
fourscore.primary-for-leagues=WC
marathonbet.sse-delay-min-ms=1500
marathonbet.sse-delay-max-ms=4500
# ----- Auth email / password reset -----
app.auth.frontend-base-url=${APP_FRONTEND_BASE_URL:http://localhost:5173}
app.auth.token-pepper=${AUTH_TOKEN_PEPPER:}
app.auth.email-verification-expiry-hours=48
app.auth.password-reset-expiry-hours=1
app.auth.rate-limit-max-attempts=5
app.auth.rate-limit-window-minutes=60
# false = вход без подтверждённого email (временно, пока настраивается SMTP). true = снова требовать подтверждение.
app.auth.require-email-confirmed-for-login=${REQUIRE_EMAIL_CONFIRMED_FOR_LOGIN:false}
app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${APP_MAIL_FROM:noreply@friendly-bets.net}
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true