# ---------------------
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID}
cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY}
cloud.aws.region.static=${AWS_REGION}
cloud.aws.s3.bucket=${AWS_S3_BUCKET}
# ---------------------
#spring.data.mongodb.host=${railway.app.mongodb.host}
#spring.data.mongodb.port=${railway.app.mongodb.port}
#spring.data.mongodb.database=${railway.app.mongodb.database}
#spring.data.mongodb.username=${railway.app.mongodb.username}
#spring.data.mongodb.password=${railway.app.mongodb.password}
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-swallow-size=50MB
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.data.mongodb.core=DEBUG
server.port=8080
app.root-redirect-url=swagger-ui.html
# Сессия и cookie JSESSIONID (~2 года). 63072000 с = 730 дней.
server.servlet.session.timeout=730d
server.servlet.session.cookie.max-age=63072000
app.security.remember-me.key=${REMEMBER_ME_KEY:friendly-bets-remember-me-dev}
app.security.remember-me.token-validity-seconds=63072000
spring.config.import=optional:classpath:football-data-team-mappings.yml
football-data.api-key=${FOOTBALL_DATA_API_KEY:}
football-data.base-url=https://api.football-data.org/v4
football-data.sync-enabled=true
# 15 minutes
football-data.polling-interval-ms=900000
football-data.default-season=2025